<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <style>
    h1 {
      color: rgb(216, 18, 18);

    <title>Aaronin sivu</title>

</head>
<body>

    <h1 style="color: rgb(70, 81, 114);">Tervetuloa sivulleni!</h1>

    <table>
